# =============================================
# SmartPark Application Configuration
# =============================================

server.port=8080

# ---- Persistent Database (Local H2 File-Based / Production PostgreSQL) ----
# Using file-based H2 locally to simulate persistence since PostgreSQL server isn't installed.
# Data will be saved in the 'backend/data' directory.
spring.datasource.url=jdbc:h2:file:./data/smartpark;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false

# ---- Flyway Database Migration ----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ---- H2 Console (accessible at /h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- SQL Init (Handled by Flyway now) ----
spring.sql.init.mode=never

# ---- Disable MongoDB (not installed) ----
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# ---- JWT Configuration ----
app.jwt.secret=SmartPark2026SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

# ---- Stripe Configuration ----
stripe.api.key=sk_test_REPLACE_WITH_YOUR_STRIPE_SECRET_KEY
stripe.webhook.secret=whsec_REPLACE_WITH_YOUR_WEBHOOK_SECRET

# ---- App Settings ----
app.slot.lock.duration-minutes=5
app.booking.buffer-minutes=15
app.booking.extra-rate-per-minute=2.00

# ---- Logging ----
logging.level.com.smartpark=INFO
logging.level.org.hibernate.SQL=WARN
