<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartPark Admin — Manage All Bookings">
    <title>Bookings — SmartPark Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">🅿</div>
                SmartPark
                <span class="sidebar-badge">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Main</div>
                <a href="index.html" class="sidebar-link"><span class="link-icon">📊</span> Dashboard</a>
                <a href="bookings.html" class="sidebar-link"><span class="link-icon">📋</span> Bookings</a>
                <div class="sidebar-section-title">Management</div>
                <a href="parking.html" class="sidebar-link"><span class="link-icon">🅿️</span> Parking Lots</a>
                <a href="users.html" class="sidebar-link"><span class="link-icon">👥</span> Users</a>
                <div class="sidebar-section-title">External</div>
                <a href="../index.html" class="sidebar-link"><span class="link-icon">🌐</span> View Website</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar" id="sidebarAvatar">A</div>
                    <div class="sidebar-user-info">
                        <div class="name" id="sidebarUserName">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                    <button class="btn btn-sm btn-secondary" onclick="AdminApp.logout()" title="Logout">↗</button>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <h1>Bookings</h1>
                    <p class="header-subtitle">View and manage all parking bookings</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <select id="statusFilter" class="form-input">
                    <option value="">All Statuses</option>
                    <option value="ACTIVE">Active</option>
                    <option value="PENDING">Pending</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="CANCELLED">Cancelled</option>
                </select>
                <div class="search-input">
                    <input type="text" id="searchInput" placeholder="Search by ref, lot, or slot..." class="form-input">
                </div>
            </div>

            <!-- Bookings Table -->
            <div class="card">
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Booking Ref</th>
                                <th>Parking Lot</th>
                                <th>Slot</th>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTable">
                            <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/admin-app.js"></script>
    <script src="js/bookings.js"></script>
</body>
</html>
