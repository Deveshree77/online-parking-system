version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartpark-db
    environment:
      POSTGRES_DB: smartpark
      POSTGRES_USER: smartuser
      POSTGRES_PASSWORD: smartpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpark-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/smartpark
      - DB_USER=smartuser
      - DB_PASSWORD=smartpassword
      - JWT_SECRET=SmartPark2026SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
      - STRIPE_API_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
      - SPRING_PROFILES_ACTIVE=prod

volumes:
  postgres_data:
