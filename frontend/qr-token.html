<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your SmartPark parking QR token for entry.">
    <title>QR Token — SmartPark</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🅿</div>
            SmartPark
        </a>
        <ul class="navbar-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Find Parking</a></li>
            <li><a href="history.html">My Bookings</a></li>
        </ul>
        <div class="navbar-user" id="navAuth"></div>
    </nav>

    <div class="page-content">
        <div class="container">
            <div class="payment-section" style="margin-top: var(--space-xl);">
                <div class="card">
                    <div class="qr-container">
                        <h2 style="margin-bottom: var(--space-sm);">🎫 Your Parking Token</h2>
                        <p class="text-muted mb-lg">Show this QR code at the parking entrance</p>

                        <div class="qr-code-wrapper" id="qrCodeWrapper">
                            <img id="qrCodeImage" src="" alt="QR Token">
                        </div>

                        <div class="booking-summary mt-xl" id="qrBookingDetails">
                            <div class="summary-item">
                                <div class="summary-label">Booking Ref</div>
                                <div class="summary-value" id="qrBookingRef">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Parking Area</div>
                                <div class="summary-value" id="qrLotName">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Slot</div>
                                <div class="summary-value" id="qrSlotNumber">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Status</div>
                                <div class="summary-value" id="qrStatus">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Start Time</div>
                                <div class="summary-value" id="qrStartTime">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">End Time</div>
                                <div class="summary-value" id="qrEndTime">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Amount Paid</div>
                                <div class="summary-value text-success" id="qrAmount">—</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">Buffer Time</div>
                                <div class="summary-value" id="qrBuffer">—</div>
                            </div>
                        </div>

                        <hr class="divider">

                        <div style="display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap;">
                            <a href="history.html" class="btn btn-secondary">📜 Booking History</a>
                            <a href="dashboard.html" class="btn btn-primary">🗺️ Book Another Spot</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/qr.js"></script>
</body>
</html>
