<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your parking booking history on SmartPark.">
    <title>Booking History — SmartPark</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🅿</div>
            SmartPark
        </a>
        <ul class="navbar-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Find Parking</a></li>
            <li><a href="history.html" class="active">My Bookings</a></li>
        </ul>
        <div class="navbar-user" id="navAuth"></div>
    </nav>

    <div class="page-content">
        <div class="container">
            <div class="section-header" style="margin-top: var(--space-xl);">
                <h1>My Bookings</h1>
                <p>View and manage your parking booking history</p>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="bookingStats">
                <div class="card stat-card">
                    <div class="stat-value text-blue" id="statTotal">0</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value text-success" id="statActive">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value text-warning" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-status="all">All</button>
                <button class="filter-tab" data-status="ACTIVE">Active</button>
                <button class="filter-tab" data-status="PENDING">Pending</button>
                <button class="filter-tab" data-status="COMPLETED">Completed</button>
                <button class="filter-tab" data-status="CANCELLED">Cancelled</button>
            </div>

            <!-- Desktop Table -->
            <div class="card" id="historyTableCard">
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>Booking Ref</th>
                            <th>Parking Area</th>
                            <th>Slot</th>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="8" class="text-center text-muted" style="padding:var(--space-3xl);">
                                <div class="loading-spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SmartPark. Built for smarter cities.</p>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
