<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your SmartPark account to manage parking bookings.">
    <title>Login — SmartPark</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🅿</div>
            SmartPark
        </a>
        <div class="navbar-user">
            <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
    </nav>

    <div class="auth-container page-content">
        <div class="auth-card card">
            <h1 class="card-title">Welcome Back</h1>
            <p class="card-subtitle">Log in to manage your parking bookings</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    Log In
                </button>
            </form>

            <div class="auth-divider">
                Don't have an account? <a href="signup.html">Sign up for free</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
