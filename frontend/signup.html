<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a free SmartPark account to start booking parking spots.">
    <title>Sign Up — SmartPark</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🅿</div>
            SmartPark
        </a>
        <div class="navbar-user">
            <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
        </div>
    </nav>

    <div class="auth-container page-content">
        <div class="auth-card card">
            <h1 class="card-title">Create Account</h1>
            <p class="card-subtitle">Join SmartPark and never struggle with parking again</p>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="John Doe" required minlength="2">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+91 9876543210">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-divider">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
